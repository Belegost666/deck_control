<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        
        <header class="stats-header">
            <div class="stat-box energy-group">
                <div class="stat-label">Énergie <span id="energy-val">0</span>/15</div>
                <div class="progress-bar-container">
                    <div id="energy-bar" class="progress-bar" style="width: 0%;"></div>
                </div>
            </div>

            <div class="stat-box temp-group">
                <div class="stat-label">Température <span id="temp-val">30</span>°C</div>
                <div class="progress-bar-container">
                    <div id="temp-bar" class="progress-bar" style="width: 30%;"></div>
                </div>
            </div>

            <div class="stat-box mana-group">
                <div class="stat-label">Mana <span id="mana-val">15</span>/<span id="mana-max">15</span></div>
                <div class="mana-dots" id="mana-dots-container"></div>
            </div>
        </header>

        <main class="game-board" id="game-board">
            <div id="start-screen">
                <h1 style="font-size: 2rem; margin-bottom: 20px; text-align: center; letter-spacing: 2px;">CYBER CONTROL</h1>
                <button class="menu-btn" onclick="startGame()">Lancer le jeu</button>
            </div>
            
            <div id="play-screen" class="hidden" style="width: 100%;">
                <p class="game-instruction" id="game-instruction">Sélectionnez une action :</p>
                <div class="cards-display" id="cards-container"></div>
            </div>
        </main>

        <div class="overlay-timer hidden" id="timer-screen">
            <h1 class="timer-card-title" id="active-card-name">-</h1>
            <div class="countdown" id="countdown-display">00:00</div>
            <p class="timer-warning">Masturbation en cours...</p>
            <button class="skip-btn" onclick="skipTimer()">Passer le chrono</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
